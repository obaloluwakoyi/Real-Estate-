# .github/workflows/daily_prediction.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs the MSFT LSTM pipeline every weekday at 8:00 AM UTC (before US market
# open at 9:30 AM ET).  Also runs on every push to main for CI checks.
# ─────────────────────────────────────────────────────────────────────────────

name: MSFT Daily Prediction

on:
  schedule:
    - cron: "0 8 * * 1-5"   # 08:00 UTC, Monday–Friday only

  push:
    branches: [main]         # also run on every push to main (CI)

  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  predict:
    name: Run LSTM Pipeline
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore cached model (skip retraining if unchanged) ───────────
      - name: Restore model cache
        id: model-cache
        uses: actions/cache@v4
        with:
          path: models/
          key: msft-model-${{ hashFiles('stage3_predict.py') }}

      # ── 5. Run the full pipeline ──────────────────────────────────────────
      - name: Run pipeline
        run: |
          python pipeline.py \
            --source api \
            ${{ steps.model-cache.outputs.cache-hit != 'true' && '--retrain' || '' }}

      # ── 6. Upload predictions as a build artifact ─────────────────────────
      - name: Upload predictions CSV
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_id }}
          path: data/predictions.csv
          retention-days: 30

      # ── 7. Upload pipeline log ────────────────────────────────────────────
      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: pipeline.log
          retention-days: 7

      # ── 8. Cache the trained model for next run ───────────────────────────
      - name: Save model cache
        if: steps.model-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: models/
          key: msft-model-${{ hashFiles('stage3_predict.py') }}
